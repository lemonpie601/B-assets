<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>레몬파이와 B컷</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🥧</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body oncontextmenu="return false" onselectstart="return false" ondragstart="return false">

  <!-- 커스텀 스크롤바 -->
  <div class="scrollbar-track"></div>
  <div class="scrollbar-thumb" id="scrollbarThumb">🍋</div>

  <!-- 헤더 -->
  <header class="site-header">
    <div class="header-inner">
      <div class="site-logo">🍋 Lemon<span>pie</span></div>
    </div>
  </header>

  <!-- 메인 콘텐츠 -->
  <main class="main-container">
    <!-- 좌측 네비게이션 -->
    <nav class="sidebar">
      <div class="sidebar-title">📁 폴더</div>
      <div class="folder-tree" id="folderTree"></div>
    </nav>

    <!-- 우측 갤러리 -->
    <section class="content">
      <div class="gallery-header" id="galleryHeader"></div>
      <div class="gallery-grid" id="gallery"></div>
    </section>
  </main>

  <!-- 라이트박스 -->
  <div class="lightbox" id="lightbox">
    <div class="lightbox-inner">
      <img class="lightbox-img" id="lightboxImg" src="" alt="">
      <div class="lightbox-title" id="lightboxTitle"></div>
    </div>
    <button class="lightbox-close" id="lightboxClose">✕</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
