<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lemonpie B-Side Archive</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #faf7f2;
      font-family: 'Noto Sans KR', sans-serif;
      color: #3a2e28;
      -webkit-user-select: none;
      -moz-user-select: none;
      user-select: none;
      min-height: 100vh;
      scrollbar-width: none;
      overflow-y: scroll;
    }
    body::-webkit-scrollbar { display: none; }

    /* ── 헤더 ── */
    .site-header {
      background: #fff;
      border-bottom: 2px solid #e8ddd3;
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }
    .site-logo {
      font-size: 22px;
      font-weight: 900;
      color: #8b5e3c;
      letter-spacing: -0.5px;
    }
    .site-logo span { color: #d4a373; }

    /* ── 탭 ── */
    .tab-bar {
      background: #fff;
      border-bottom: 1px solid #ede6df;
      padding: 0 24px;
    }
    .tab-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      gap: 4px;
      overflow-x: auto;
      scrollbar-width: none;
      padding: 12px 0;
    }
    .tab-inner::-webkit-scrollbar { display: none; }
    .tab-btn {
      padding: 8px 20px;
      border: 2px solid #ddd3c8;
      background: transparent;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
      color: #8b7355;
      white-space: nowrap;
      transition: all 0.2s;
      font-family: inherit;
    }
    .tab-btn:hover { border-color: #8b5e3c; color: #8b5e3c; background: #fdf5ec; }
    .tab-btn.active { background: #8b5e3c; color: #fff; border-color: #8b5e3c; }

    /* ── 메인 레이아웃 ── */
    .main-wrap {
      max-width: 1100px;
      margin: 36px auto;
      padding: 0 24px;
    }

    /* ── 포스트 그리드 ── */
    .post-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 28px;
    }

    /* ── 카드 ── */
    .card {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.07);
      transition: transform 0.25s, box-shadow 0.25s;
      cursor: pointer;
      border: 1px solid #ede6df;
    }
    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.13);
    }
    .card-thumb {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }
    .card-body {
      padding: 16px 18px 18px;
    }
    .card-tag {
      display: inline-block;
      background: #fdf5ec;
      color: #8b5e3c;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 999px;
      margin-bottom: 8px;
      border: 1px solid #e8d9c8;
    }
    .card-title {
      font-size: 15px;
      font-weight: 700;
      color: #3a2e28;
      line-height: 1.5;
    }

    /* ── 라이트박스 (이미지 크게 보기) ── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      padding: 24px;
      backdrop-filter: blur(4px);
    }
    .lightbox.open { display: flex; }
    .lightbox-inner {
      position: relative;
      max-width: 90vw;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .lightbox-img {
      max-width: 100%;
      max-height: 80vh;
      border-radius: 12px;
      object-fit: contain;
      pointer-events: none;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .lightbox-title {
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      text-align: center;
    }
    .lightbox-close {
      position: fixed;
      top: 20px;
      right: 24px;
      background: rgba(255,255,255,0.15);
      border: none;
      color: #fff;
      font-size: 28px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      font-family: inherit;
    }
    .lightbox-close:hover { background: rgba(255,255,255,0.3); }

    /* ── 빈 상태 ── */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: #b0998a;
      font-size: 15px;
    }

    /* ── 반응형 ── */
    @media (max-width: 640px) {
      .post-grid { grid-template-columns: repeat(2, 1fr); gap: 14px; }
      .main-wrap { margin: 20px auto; padding: 0 14px; }
      .card-body { padding: 12px 14px 14px; }
      .card-title { font-size: 13px; }
    }

    /* ── 차단 오버레이 ── */
    .blocked-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #faf7f2;
      z-index: 99999;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      font-family: 'Noto Sans KR', sans-serif;
    }
    .blocked-overlay.show { display: flex; }
    .blocked-overlay .lock-icon { font-size: 64px; }
    .blocked-overlay .lock-msg { font-size: 20px; font-weight: 700; color: #5d4037; }
    .blocked-overlay .lock-sub { font-size: 14px; color: #a08070; }

    /* ── 커스텀 스크롤바 (이모지) ── */
    .scrollbar-track {
      position: fixed;
      right: 0;
      top: 0;
      width: 40px;
      height: 100vh;
      background: transparent;
      z-index: 1000;
      pointer-events: none;
    }
    .scrollbar-thumb {
      position: fixed;
      right: 5px;
      width: 30px;
      height: 30px;
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: grab;
      z-index: 1001;
      user-select: none;
      transition: transform 0.1s;
      pointer-events: auto;
    }
    .scrollbar-thumb:hover { transform: scale(1.15); }
    .scrollbar-thumb:active { cursor: grabbing; }
  </style>
</head>

<body oncontextmenu="return false" onselectstart="return false" ondragstart="return false">

  <!-- 차단 오버레이 -->
  <div class="blocked-overlay" id="blockedOverlay">
    <div class="lock-icon">🔒</div>
    <div class="lock-msg">접근이 차단되었습니다</div>
    <div class="lock-sub">개발자 도구 사용이 감지되었습니다</div>
  </div>

  <!-- 커스텀 스크롤바 -->
  <div class="scrollbar-track"></div>
  <div class="scrollbar-thumb" id="scrollbarThumb">🍋</div>

  <!-- 헤더 -->
  <header class="site-header">
    <div class="header-inner">
      <div class="site-logo">🍋 Lemon<span>pie</span></div>
    </div>
  </header>

  <!-- 탭 바 -->
  <nav class="tab-bar">
    <div class="tab-inner" id="tabs">
      <button class="tab-btn active">로딩 중...</button>
    </div>
  </nav>

  <!-- 메인 콘텐츠 -->
  <main class="main-wrap">
    <div class="post-grid" id="gallery"></div>
  </main>

  <!-- 라이트박스 -->
  <div class="lightbox" id="lightbox">
    <div class="lightbox-inner">
      <img class="lightbox-img" id="lightboxImg" src="" alt="">
      <div class="lightbox-title" id="lightboxTitle"></div>
    </div>
    <button class="lightbox-close" id="lightboxClose">✕</button>
  </div>

  <script>
    /* ====================================================
       1. 개발자 도구 완전 차단
    ==================================================== */
    (function() {
      function showBlocked() {
        document.getElementById('blockedOverlay').classList.add('show');
      }

      // 키보드 단축키 차단
      document.addEventListener('keydown', function(e) {
        // F12
        if (e.keyCode === 123) { e.preventDefault(); e.stopPropagation(); return false; }
        // Ctrl+Shift+I / J / C / K  (개발자 도구)
        if (e.ctrlKey && e.shiftKey && [73,74,67,75].indexOf(e.keyCode) !== -1) {
          e.preventDefault(); e.stopPropagation(); return false;
        }
        // Ctrl+U (소스 보기) / Ctrl+S (저장) / Ctrl+P (인쇄)
        if (e.ctrlKey && [85,83,80].indexOf(e.keyCode) !== -1) {
          e.preventDefault(); e.stopPropagation(); return false;
        }
      }, true);

      // 창 크기 차이로 개발자 도구 감지
      var THRESHOLD = 160;
      function detectBySize() {
        if ((window.outerWidth - window.innerWidth > THRESHOLD) ||
            (window.outerHeight - window.innerHeight > THRESHOLD)) {
          showBlocked();
        }
      }
      setInterval(detectBySize, 500);

      // console 트릭으로 감지
      var devImg = new Image();
      Object.defineProperty(devImg, 'id', {
        get: function() { showBlocked(); }
      });
      setInterval(function() {
        console.log(devImg);
        console.clear();
      }, 1000);

      // debugger 루프 (소스 디버깅 방해)
      setInterval(function() { debugger; }, 100);

    })();

    /* ====================================================
       2. 커스텀 이모지 스크롤바
    ==================================================== */
    var thumb = document.getElementById('scrollbarThumb');
    var isDragging = false;
    var dragStartY = 0;

    function updateScrollbar() {
      var scrollPercentage = (window.scrollY / (document.documentElement.scrollHeight - window.innerHeight)) * 100;
      var thumbPosition = (window.innerHeight - 30) * (scrollPercentage / 100);
      thumb.style.top = thumbPosition + 'px';
      thumb.textContent = scrollPercentage > 50 ? '🥧' : '🍋';
    }

    window.addEventListener('scroll', updateScrollbar);

    thumb.addEventListener('mousedown', function(e) {
      isDragging = true;
      dragStartY = e.clientY - thumb.getBoundingClientRect().top;
      e.preventDefault();
    });

    document.addEventListener('mousemove', function(e) {
      if (!isDragging) return;
      var trackHeight = window.innerHeight - 30;
      var newTop = e.clientY - dragStartY;
      newTop = Math.max(0, Math.min(newTop, trackHeight));
      var scrollPercentage = (newTop / trackHeight) * 100;
      var scrollHeight = document.documentElement.scrollHeight - window.innerHeight;
      window.scrollTo(0, (scrollPercentage / 100) * scrollHeight);
    });

    document.addEventListener('mouseup', function() {
      isDragging = false;
    });

    /* ====================================================
       3. 라이트박스 (이미지 크게 보기)
    ==================================================== */
    var lightbox      = document.getElementById('lightbox');
    var lightboxImg   = document.getElementById('lightboxImg');
    var lightboxTitle = document.getElementById('lightboxTitle');
    var lightboxClose = document.getElementById('lightboxClose');

    function openLightbox(src, title) {
      lightboxImg.src = src;
      lightboxTitle.textContent = title;
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeLightbox() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
      setTimeout(function() { lightboxImg.src = ''; }, 300);
    }
    lightboxClose.addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', function(e) {
      if (e.target === lightbox) closeLightbox();
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeLightbox();
    });

    /* ====================================================
       4. 갤러리 로딩
    ==================================================== */
    var JSON_URL = 'https://raw.githubusercontent.com/lemonpie601/B-assets/main/assets.json';
    var items = [];

    function init() {
      fetch(JSON_URL)
        .then(function(r) { return r.json(); })
        .then(function(data) {
          items = data;
          renderTabs();
          showCategory('전체');
        })
        .catch(function() {
          document.getElementById('gallery').innerHTML =
            '<div class="empty-state">데이터를 불러오지 못했습니다 😢</div>';
        });
    }

    function renderTabs() {
      var container = document.getElementById('tabs');
      var cats = ['전체'];
      items.forEach(function(i) {
        if (cats.indexOf(i.tab) === -1) cats.push(i.tab);
      });
      container.innerHTML = '';
      cats.forEach(function(cat) {
        var btn = document.createElement('button');
        btn.className = 'tab-btn' + (cat === '전체' ? ' active' : '');
        btn.textContent = cat;
        btn.addEventListener('click', function() {
          document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
          btn.classList.add('active');
          showCategory(cat);
        });
        container.appendChild(btn);
      });
    }

    function showCategory(category) {
      var grid = document.getElementById('gallery');
      grid.innerHTML = '';
      var filtered = category === '전체' ? items : items.filter(function(i) { return i.tab === category; });

      if (filtered.length === 0) {
        grid.innerHTML = '<div class="empty-state">아직 등록된 에셋이 없어요 🍋</div>';
        return;
      }

      filtered.forEach(function(item) {
        var card = document.createElement('div');
        card.className = 'card';
        card.innerHTML =
          '<img class="card-thumb" src="' + item.img + '" loading="lazy" alt="' + item.name + '">' +
          '<div class="card-body">' +
          '<span class="card-tag">' + item.tab + '</span>' +
          '<div class="card-title">' + item.name + '</div>' +
          '</div>';
        card.addEventListener('click', function() {
          openLightbox(item.img, item.name);
        });
        grid.appendChild(card);
      });
    }

    init();
  </script>
</body>
</html>
