<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lemonpie B-Side Archive</title>
    <style>
        /* 기본 스타일 및 색감 */
        body { background-color: #f0e5d8; margin: 0; padding: clamp(10px, 3vw, 30px); font-family: 'Nanum Gothic', sans-serif; color: #5d4037; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; }
        .container { width: 100%; max-width: 950px; margin: 0 auto; background: #fffdf5; border: 6px solid #8b5e3c; border-radius: 20px; padding-bottom: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .header { text-align: center; padding: 50px 20px 30px; border-bottom: 2px dashed #d4a373; margin: 0 40px 30px; }
        
        /* 탭 버튼 디자인 */
        .tab-container { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; padding: 0 20px; }
        .tab-btn { padding: 10px 20px; border: 2px solid #8b5e3c; background: #fff; border-radius: 25px; cursor: pointer; font-weight: bold; color: #8b5e3c; transition: 0.3s; font-size: 14px; }
        .tab-btn.active { background: #8b5e3c; color: #fff; box-shadow: 0 4px 0 #5d4037; }

        /* 그리드 디자인 */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 0 30px; }
        .card { background: #fff; border: 1px solid #eee; border-radius: 12px; padding: 10px; box-shadow: 5px 5px 0 #faedcd; transition: 0.2s; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 250px; object-fit: cover; border-radius: 8px; pointer-events: none; } /* 이미지 저장 방지 */
        .card p { text-align: center; font-weight: bold; margin-top: 12px; font-size: 14px; color: #3e2723; }

        @media (max-width: 600px) {
            .grid { grid-template-columns: repeat(2, 1fr); padding: 0 15px; gap: 12px; }
            .card img { height: 180px; }
        }
    </style>
</head>
<body oncontextmenu="return false" onselectstart="return false" ondragstart="return false">

<div class="container">
    <div class="header">
        <h1 style="margin:0; font-size: clamp(24px, 5vw, 36px);">🍋 B-Side Archive</h1>
        <p style="margin-top:10px; font-weight:bold; opacity:0.8;">@lemonpie 에셋 보관함</p>
    </div>

    <div class="tab-container" id="tabs">
        <button class="tab-btn active">로딩 중...</button>
    </div>

    <div id="gallery" class="grid"></div>
</div>

<script>
    // 1. 본인의 Raw JSON 주소로 수정 필수!
    const JSON_URL = 'https://raw.githubusercontent.com/lemonpie601/B-assets/main/assets.json';
    
    let items = [];

    async function init() {
        try {
            const res = await fetch(JSON_URL);
            items = await res.json();
            renderTabs();
            showCategory('전체');
        } catch (e) {
            console.error("데이터 로딩 실패");
        }
    }

    function renderTabs() {
        const container = document.getElementById('tabs');
        const categories = ['전체', ...new Set(items.map(i => i.tab))];
        
        container.innerHTML = '';
        categories.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'tab-btn' + (cat === '전체' ? ' active' : '');
            btn.innerText = cat;
            btn.onclick = (e) => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                showCategory(cat);
            };
            container.appendChild(btn);
        });
    }

    function showCategory(category) {
        const grid = document.getElementById('gallery');
        grid.innerHTML = '';
        
        const filtered = category === '전체' ? items : items.filter(i => i.tab === category);
        
        filtered.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<img src="${item.img}" loading="lazy"><p>${item.name}</p>`;
            grid.appendChild(card);
        });
    }

    // F12 및 주요 단축키 차단
    window.addEventListener('keydown', (e) => {
        if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || (e.ctrlKey && e.keyCode === 85)) {
            e.preventDefault();
        }
    });

    init();
</script>
</body>
</html>
