<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lemonpie B-Side Gallery</title>
    <style>
        /* 기존 애니메이션 및 기본 스타일 */
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        body { background-color: #f0e5d8; margin: 0; padding: clamp(10px, 3vw, 30px); font-family: 'Nanum Gothic', sans-serif; color: #5d4037; }
        
        .container {
            width: 100%; max-width: 950px; margin: 0 auto; background: #fffdf5; 
            border: 6px solid #8b5e3c; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding-bottom: 40px; position: relative;
        }

        .header { text-align: center; padding: 50px 20px 20px; }
        .header h1 { font-size: 32px; margin-bottom: 10px; }

        /* 탭 스타일 */
        .tab-container {
            display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; padding: 0 20px;
        }
        .tab-btn {
            padding: 8px 18px; border: 2px solid #8b5e3c; background: #fff;
            border-radius: 20px; cursor: pointer; font-weight: bold; color: #8b5e3c;
            transition: 0.2s;
        }
        .tab-btn.active { background: #8b5e3c; color: #fff; }

        /* 그리드 레이아웃 */
        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px; padding: 0 30px;
        }
        .card {
            background: #fff; border: 1px solid #eee; border-radius: 12px; padding: 8px;
            box-shadow: 4px 4px 0 #faedcd; transition: 0.3s;
        }
        .card:hover { transform: scale(1.03); }
        .card img { width: 100%; height: 220px; object-fit: cover; border-radius: 8px; }
        .card p { text-align: center; font-size: 13px; margin: 8px 0; font-weight: bold; }

        /* 반응형 */
        @media (max-width: 600px) {
            .grid { grid-template-columns: repeat(2, 1fr); padding: 0 15px; gap: 10px; }
            .card img { height: 180px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🍋 B-Side Archive</h1>
        <p>카테고리를 선택해서 에셋을 구경해보세요.</p>
    </div>

    <div class="tab-container" id="tab-menu"></div>

    <div class="grid" id="image-grid"></div>
</div>

<script>
    // 1. 본인의 깃허브 주소로 변경하세요
    const JSON_URL = 'https://github.com/lemonpie601/B-assets/main/assets.json';
    const IMG_BASE = 'https://github.com/lemonpie601/B-assets/main/';

    let allItems = [];

    async function init() {
        try {
            const res = await fetch(JSON_URL);
            const data = await res.json();
            allItems = data.items;

            renderTabs(data.categories);
            renderGallery('all'); // 초기값: 전체보기
        } catch (err) {
            console.error("데이터 로드 실패", err);
        }
    }

    // 탭 그리기
    function renderTabs(categories) {
        const menu = document.getElementById('tab-menu');
        categories.forEach((cat, idx) => {
            const btn = document.createElement('button');
            btn.className = `tab-btn ${idx === 0 ? 'active' : ''}`;
            btn.innerText = cat.name;
            btn.onclick = () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderGallery(cat.id);
            };
            menu.appendChild(btn);
        });
    }

    // 갤러리 그리기
    function renderGallery(categoryId) {
        const grid = document.getElementById('image-grid');
        grid.innerHTML = ''; // 초기화

        const filtered = categoryId === 'all' 
            ? allItems 
            : allItems.filter(item => item.category === categoryId);

        filtered.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${IMG_BASE}${item.url}" loading="lazy">
                <p>${item.title}</p>
            `;
            grid.appendChild(card);
        });
    }

    init();
</script>
</body>
</html>
